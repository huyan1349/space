<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR DOMINION v2 - 轨道模型增强版</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #05070d;
            --panel: linear-gradient(180deg, rgba(13, 20, 38, 0.94), rgba(8, 12, 24, 0.9));
            --panel-hover: rgba(27, 38, 66, 0.98);
            --border: rgba(150, 186, 255, 0.12);
            --border-hover: rgba(198, 221, 255, 0.22);
            --text-primary: rgba(245, 248, 255, 0.95);
            --text-secondary: rgba(184, 196, 225, 0.64);
            --text-muted: rgba(160, 174, 206, 0.28);
            --accent: rgba(255, 255, 255, 0.92);
            --shadow: 0 0 0 1px rgba(255, 255, 255, 0.03), 0 34px 120px rgba(0, 0, 0, 0.65);
            --green: #34d399;
            --red: #f87171;
            --blue: #60a5fa;
            --purple: #a78bfa;
            --yellow: #fbbf24;
            --cyan: #22d3ee;
        }

        body {
            font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(84, 125, 255, 0.16), transparent 24%),
                radial-gradient(circle at 78% 18%, rgba(80, 132, 255, 0.12), transparent 22%),
                linear-gradient(180deg, #060914 0%, #05070d 42%, #02040a 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 150px 150px;
            mask-image: radial-gradient(circle at center, black, transparent 82%);
            opacity: 0.16;
        }

        #container { position: relative; width: 100vw; height: 100vh; }
        #earth-container { position: absolute; inset: 0; }

        #earth-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.45s ease;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 4, 12, 0.55) 100%);
        }
        #earth-container.game-focus::after {
            opacity: 1;
        }

        .game-reticle {
            position: fixed;
            inset: 12px;
            z-index: 45;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .game-reticle.active { opacity: 1; }
        .game-reticle::before,
        .game-reticle::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(147, 197, 253, 0.45);
        }
        .game-reticle::before { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 2px 0 0 0; }
        .game-reticle::after { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 2px 0 0; }
        .game-reticle span.corner-bl,
        .game-reticle span.corner-br {
            position: absolute;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(147, 197, 253, 0.45);
            bottom: 0;
        }
        .game-reticle span.corner-bl { left: 0; border-right: none; border-top: none; border-radius: 0 0 0 2px; }
        .game-reticle span.corner-br { right: 0; border-left: none; border-top: none; border-radius: 0 0 2px 0; }

        #notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .notification {
            padding: 12px 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-primary);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .notification.success { border-color: rgba(52, 211, 153, 0.3); }
        .notification.warning { border-color: rgba(251, 191, 36, 0.3); }
        .notification.error { border-color: rgba(248, 113, 113, 0.3); }
        .notification.info { border-color: rgba(96, 165, 250, 0.3); }

        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--green);
            z-index: 9999;
            opacity: 0;
            animation: floatUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.7); }
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 40px;
            pointer-events: none;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            pointer-events: auto;
        }

        .logo-copy { display: flex; flex-direction: column; gap: 4px; }

        .logo-mark {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg { width: 26px; height: 26px; opacity: 0.8; }
        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.24em;
            text-transform: uppercase;
        }
        .logo-sub {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .resource-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 178px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .resource-glyph {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: rgba(244,248,255,0.82);
            font-size: 14px;
        }

        .resource-stack { display:flex; flex-direction:column; gap: 2px; min-width: 0; }

        .resource-indicator::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
        }

        .resource-indicator.pulse::after {
            animation: resourcePulse 0.6s ease;
        }

        @keyframes resourcePulse {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .resource-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .resource-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .resource-rate {
            font-size: 10px;
            color: var(--green);
        }

        .resource-rate.negative { color: var(--red); }

        .time-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            backdrop-filter: blur(20px);
        }

        .time-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
        .time-btn.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .hud-action-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.24s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }

        .hud-action-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            background: rgba(255,255,255,0.07);
            transform: translateY(-1px);
        }

        @media (max-width: 1220px) {
            .header { padding: 20px 22px; }
            .header-content { align-items: flex-start; gap: 18px; }
            .header-meta { gap: 10px; }
            .resource-indicator { min-width: 156px; }
            .panel { left: 22px; width: 360px; }
            .detail-panel { right: 22px; width: 332px; }
        }

        @media (max-width: 980px) {
            .header-content { flex-direction: column; align-items: stretch; }
            .header-meta { justify-content: flex-start; }
            .panel {
                top: auto;
                bottom: 18px;
                left: 18px;
                right: 18px;
                width: auto;
                height: 48vh;
            }
            .detail-panel {
                top: 112px;
                right: 18px;
                left: 18px;
                width: auto;
            }
        }

        .panel {
            position: absolute;
            top: 96px;
            left: 40px;
            width: 400px;
            height: calc(100vh - 136px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            z-index: 100;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(26px);
            transform: translateX(-120%);
            animation: panelSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        @keyframes panelSlideIn {
            from { transform: translateX(-120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .panel-header {
            padding: 20px 24px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent);
        }

        .panel-tab {
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            position: relative;
        }

        .panel-tab.active {
            color: var(--text-primary);
            background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .panel-tab:hover:not(.active) { color: var(--text-secondary); }

        .panel-tab .tab-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--blue);
            animation: badgePulse 2s ease infinite;
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .panel-content {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .panel-content::-webkit-scrollbar { width: 3px; }
        .panel-content::-webkit-scrollbar-track { background: transparent; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .section-title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 8px;
            height: 1px;
            background: var(--text-muted);
            opacity: 0.3;
        }

        .building-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

        .building-card {
            position: relative;
            padding: 16px 18px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .building-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .building-card:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }

        .building-card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .building-card.disabled.visible { opacity: 0.5; transform: translateY(0); }

        .building-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .building-left { display: flex; align-items: flex-start; gap: 12px; }

        .building-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .building-icon svg { width: 18px; height: 18px; opacity: 0.7; }

        .building-info { flex: 1; min-width: 0; }

        .building-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
        .building-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

        .building-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .building-cost { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }

        .cost-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .cost-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.4;
        }

        .construction-progress {
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .construction-progress.active { display: block; }

        .construction-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--cyan));
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .ship-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

        .ship-card {
            position: relative;
            padding: 16px 18px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateX(-20px);
        }

        .ship-card.visible { opacity: 1; transform: translateX(0); }
        .ship-card:hover { border-color: var(--border-hover); background: rgba(255, 255, 255, 0.04); transform: translateY(-2px); }
        .ship-card.visible:hover { transform: translateY(-2px); }

        .ship-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 6px; }

        .ship-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ship-icon svg { width: 18px; height: 18px; opacity: 0.7; }
        .ship-info { flex: 1; min-width: 0; }
        .ship-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
        .ship-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

        .ship-stats { display: flex; gap: 12px; margin-top: 10px; }
        .ship-stat { font-size: 11px; color: var(--text-muted); }

        .mission-card {
            padding: 16px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.95);
        }

        .mission-card.visible { opacity: 1; transform: scale(1); }
        .mission-card:hover { border-color: var(--border-hover); background: rgba(255, 255, 255, 0.04); }

        .mission-card.special {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        .mission-card.completed {
            border-color: rgba(52, 211, 153, 0.3);
            background: rgba(52, 211, 153, 0.05);
        }

        .mission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .mission-title { font-size: 14px; font-weight: 500; }

        .mission-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
        }

        .mission-badge.legendary { color: var(--yellow); background: rgba(251, 191, 36, 0.1); }
        .mission-badge.completed-badge { color: var(--green); background: rgba(52, 211, 153, 0.1); }

        .mission-description {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .mission-reward {
            font-size: 11px;
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            display: inline-block;
        }

        .mission-progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .mission-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--cyan));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .detail-panel {
            position: absolute;
            top: 96px;
            right: 40px;
            width: 360px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            box-shadow: var(--shadow);
            display: none;
        }

        .detail-panel.active { display: block; animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .detail-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-title { font-size: 14px; font-weight: 500; }

        .detail-close {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .detail-close:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
        }

        .detail-body { padding: 20px 24px; }
        .detail-section { margin-bottom: 18px; }

        .detail-section-title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .detail-description {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .config-control { margin-bottom: 16px; }

        .config-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .config-value { font-variant-numeric: tabular-nums; color: var(--text-primary); }

        .config-slider {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            outline: none;
        }

        .config-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .config-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.2s ease;
        }

                shipStates: Object.entries(GameState.ships).map(([id, count]) => ({ id, count, data: shipData[id] })).filter(item => item.data),

        function recalcRates() {
            let e = 0, m = 0, s = 0;
            for (const [type, count] of Object.entries(GameState.buildings)) {
                const data = buildingData[type];
                if (data) {
                    e += data.energyRate * count;
                    m += data.mineralRate * count;
                    s += data.scienceRate * count;
                }
            }
            if (GameState.technologies['energy_boost']) e = Math.floor(e * 1.5);
            if (GameState.technologies['mining_tech']) m = Math.floor(m * 1.5);
            GameState.energyRate = e;
            GameState.mineralRate = m;
            GameState.scienceRate = s;
        }

        function renderMissions() {
            const list = document.getElementById('mission-list');
            list.innerHTML = '';
            missionData.forEach(mission => {
                const completed = GameState.missions[mission.id];
                const progress = mission.progress();
                const target = mission.requirement.toString().match(/\d+/g);
                const targetVal = target ? Math.max(...target.map(Number)) : 1;
                const pct = mission.special === 'infinite' ? 0 : Math.min(100, (progress / targetVal) * 100);
                const card = document.createElement('div');
                card.className = `mission-card ${completed ? 'completed' : ''} ${mission.special ? 'special' : ''}`;
                card.innerHTML = `
                    <div class="mission-header">
                        <span class="mission-title">${mission.name}</span>
                        <span class="mission-badge ${completed ? 'completed-badge' : ''} ${mission.badge === '传奇' ? 'legendary' : ''}">${completed ? '已完成' : mission.badge}</span>
                    </div>
                    <div class="mission-description">${mission.description}</div>
                    <div class="mission-reward">奖励: ${formatReward(mission.reward)}</div>
                    ${!mission.special && !completed ? `<div class="mission-progress-bar"><div class="mission-progress-fill" style="width:${pct}%"></div></div><div style="font-size:10px;color:var(--text-muted);margin-top:4px;">${progress}/${targetVal}</div>` : ''}
                `;
                if (!completed) {
                    card.addEventListener('click', () => claimMission(mission));
                }
                list.appendChild(card);
                setTimeout(() => card.classList.add('visible'), 100 + Math.random() * 300);
            });
        }

        function formatReward(reward) {
            const parts = [];
            if (reward.energy) parts.push(reward.energy + ' 能源');
            if (reward.minerals) parts.push(reward.minerals + ' 矿物');
            if (reward.science) parts.push(reward.science + ' 科技');
            return parts.join(' + ');
        }

        function claimMission(mission) {
            if (GameState.missions[mission.id]) return;
            if (mission.special === 'infinite') {
                GameState.infiniteResources = true;
                GameState.missions[mission.id] = true;
                GameState.missionsCompleted++;
                flashScreen();
                notify('无限资源已激活！', 'success');
                updateResourceDisplay();
                renderMissions();
                return;
            }
            if (mission.requirement()) {
                GameState.energy += mission.reward.energy || 0;
                GameState.minerals += mission.reward.minerals || 0;
                GameState.science += mission.reward.science || 0;
                GameState.missions[mission.id] = true;
                GameState.missionsCompleted++;
                pulseResource('energy');
                pulseResource('mineral');
                notify(`任务完成: ${mission.name}`, 'success');
                updateResourceDisplay();
                renderMissions();
            } else {
                notify('任务条件尚未满足', 'warning');
            }
        }

        function createWarpAnimation() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const particles = [];

            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: cx,
                    y: cy,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    life: 1,
                    size: Math.random() * 3 + 1,
                });
            }

            let frame = 0;
            function animateWarp() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = '#60a5fa';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                frame++;
                if (frame < 60 && particles.some(p => p.life > 0)) {
                    requestAnimationFrame(animateWarp);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animateWarp();
        }

        function createConstructionParticles(x, y) {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * (Math.random() * 4 + 2),
                    vy: Math.sin(angle) * (Math.random() * 4 + 2),
                    life: 1,
                    size: Math.random() * 2 + 1,
                    color: Math.random() > 0.5 ? '#22d3ee' : '#a78bfa',
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                    p.life -= 0.025;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                frame++;
                if (frame < 50 && particles.some(p => p.life > 0)) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animate();
        }

        function loadGLTFLoaderScript() {
            return new Promise((resolve, reject) => {
                if (typeof THREE !== 'undefined' && THREE.GLTFLoader) {
                    resolve();
                    return;
                }
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
                s.onload = () => resolve();
                s.onerror = () => reject(new Error('GLTFLoader load failed'));
                document.head.appendChild(s);
            });
        }

        function cloneGltfForOrbitInstance(sceneRoot) {
            const root = sceneRoot.clone(true);
            root.traverse(ch => {
                if (!ch.isMesh) return;
                if (ch.geometry && !ch.isSkinnedMesh) ch.geometry = ch.geometry.clone();
                if (ch.material) {
                    ch.material = Array.isArray(ch.material)
                        ? ch.material.map(m => m.clone())
                        : ch.material.clone();
                }
            });
            return root;
        }

        function normalizeGltfToHeight(root, targetHeight) {
            root.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(root);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxD = Math.max(size.x, size.y, size.z, 1e-5);
            const s = targetHeight / maxD;
            root.scale.setScalar(s);
            root.updateMatrixWorld(true);
            const box2 = new THREE.Box3().setFromObject(root);
            const center = new THREE.Vector3();
            box2.getCenter(center);
            root.position.sub(center);
        }

        function tintGltfMeshes(root, colorHex, emissiveHex, emissiveBoost) {
            root.traverse(ch => {
                if (!ch.isMesh || !ch.material) return;
                const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
                mats.forEach(m => {
                    if (m.color) m.color.setHex(colorHex);
                    if (m.emissive) {
                        m.emissive.setHex(emissiveHex);
                        if (typeof m.emissiveIntensity === 'number') m.emissiveIntensity = emissiveBoost;
                    }
                    m.needsUpdate = true;
                });
            });
        }

        function spawnHelmetOrbitModel(targetHeight, colorHex, emissiveHex, emInt, rotX, rotY) {
            if (!orbitGltfHelmetScene) return null;
            const model = cloneGltfForOrbitInstance(orbitGltfHelmetScene);
            normalizeGltfToHeight(model, targetHeight);
            tintGltfMeshes(model, colorHex, emissiveHex, emInt);
            if (rotX != null && Number.isFinite(rotX)) model.rotation.x = rotX;
            if (rotY != null && Number.isFinite(rotY)) model.rotation.y = rotY;
            return model;
        }

        let orbitHelmetPreloadPromise = null;

        function preloadOrbitHelmetGltf() {
            if (!THREE || !THREE.GLTFLoader) return Promise.resolve();
            if (orbitHelmetPreloadPromise) return orbitHelmetPreloadPromise;
            const loader = new THREE.GLTFLoader();
            if (loader.manager) loader.manager.crossOrigin = 'anonymous';
            orbitHelmetPreloadPromise = new Promise(resolve => {
                const finishFail = () => {
                    orbitGltfHelmetScene = null;
                    resolve();
                };
                loader.load(
                    ORBIT_HELMET_GLB_PRIMARY,
                    gltf => {
                        orbitGltfHelmetScene = gltf.scene;
                        resolve();
                    },
                    undefined,
                    () => {
                        loader.load(
                            ORBIT_HELMET_GLB_FALLBACK,
                            gltf => {
                                orbitGltfHelmetScene = gltf.scene;
                                resolve();
                            },
                            undefined,
                            finishFail
                        );
                    }
                );
            }).then(() => {
                if (orbitGltfHelmetScene) notify('轨道 DamagedHelmet 模型已加载（按设施类型着色与缩放）', 'success');
                else notify('轨道头盔模型加载失败，已使用简化几何', 'warning');
            });
            return orbitHelmetPreloadPromise;
        }

            const el = document.getElementById('spatial-mode-hud');
            const ret = document.getElementById('game-reticle');
            const earthWrap = document.getElementById('earth-container');
            const focus = mainInteractMode === 'place' || mainInteractMode === 'command';
            if (ret) ret.classList.toggle('active', focus);
            if (earthWrap) earthWrap.classList.toggle('game-focus', focus);
            if (!el) return;
            if (mainInteractMode === 'place' && placePendingType) {
                const d = buildingData[placePendingType];
                el.textContent = `部署模式 · 点击星球表面放置「${d ? d.name : placePendingType}」 · Esc 取消`;
                el.className = 'spatial-mode-hud visible place';
            } else if (mainInteractMode === 'command') {
                el.textContent = '指挥模式 · 点击轨道设施检视 / G 切换观察';
                el.className = 'spatial-mode-hud visible command';
            } else {
                el.className = 'spatial-mode-hud';
                el.textContent = '';
            }
        }

        function enterPlaceMode(type) {
            if (!buildingData[type]) return;
            if (buildingData[type].requiredTech && !GameState.technologies[buildingData[type].requiredTech]) {
                notify('科技未解锁', 'warning');
                return;
            }
            const d = buildingData[type];
            if (GameState.energy < d.energyCost || GameState.minerals < d.mineralCost) {
                notify('资源不足！', 'error');
                return;
            }
            mainInteractMode = 'place';
            placePendingType = type;
            document.getElementById('detail-panel')?.classList.remove('active');
            updateSpatialModeHud();
            notify('部署模式：点击星球表面确认建造位置', 'info');
        }

        function exitPlaceMode() {
            if (mainInteractMode !== 'place') return;
            mainInteractMode = 'observe';
            placePendingType = null;
            if (mainPlacePreview) mainPlacePreview.visible = false;
            updateSpatialModeHud();
        }

        function cycleMainInteractMode() {
            if (mainInteractMode === 'place') return;
            mainInteractMode = mainInteractMode === 'observe' ? 'command' : 'observe';
            updateSpatialModeHud();
            if (mainInteractMode === 'command') {
                notify('指挥模式：轨道设施可点开详情', 'info');
            }
        }

        function disposeOrbitMarkerRoot(root) {
            root.traverse(ch => {
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) {
                    const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
                    mats.forEach(m => {
                        if (m.map) m.map.dispose();
                        m.dispose();
                    });
                }
            });
        }

        function orbMatHull(color, emissive, emInt, metal, rough) {
            return new THREE.MeshStandardMaterial({
                color,
                emissive,
                emissiveIntensity: emInt,
                metalness: metal,
                roughness: rough
            });
        }

        function orbMatGlow(hex, emInt) {
            return new THREE.MeshStandardMaterial({
                color: hex,
                emissive: hex,
                emissiveIntensity: emInt,
                metalness: 0.35,
                roughness: 0.28,
                transparent: true,
                opacity: 0.9
            });
        }

        function attachOrbitHitSphere(root, kind, typeKey) {
            const hit = new THREE.Mesh(
                new THREE.SphereGeometry(0.16, 10, 10),
                new THREE.MeshBasicMaterial({ visible: false, transparent: true, opacity: 0 })
            );
            hit.userData.markerPick = true;
            hit.userData.markerKind = kind;
            hit.userData.markerHoverRoot = root;
            if (kind === 'building') hit.userData.buildingType = typeKey;
            else hit.userData.shipType = typeKey;
            root.add(hit);
        }

        function createMainOrbitBuildingMarker(buildingType) {
            const root = new THREE.Group();
            const spin = new THREE.Group();
            root.userData.spinGroup = spin;
            root.add(spin);
            attachOrbitHitSphere(root, 'building', buildingType);

            if (orbitGltfHelmetScene) {
                const [col, em, ei] = buildingGltfTint(buildingType);
                const h = ORBIT_GLTF_HEIGHT_BUILD[buildingType] || 0.24;
                const [rx, ry] = ORBIT_GLTF_ROT_BUILD[buildingType] || [Math.PI / 2, 0];
                const gl = spawnHelmetOrbitModel(h, col, em, ei, rx, ry);
                if (gl) {
                    spin.add(gl);
                    return root;
                }
            }

            const hull = orbMatHull(0xd8e4f8, 0x1e2d48, 0.12, 0.78, 0.26);

            const warm = orbMatGlow(0xfbbf24, 0.35);

            const add = (mesh) => {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                spin.add(mesh);
            };

            switch (buildingType) {
                case 'station': {
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.22, 10), hull);
                    body.position.y = 0;

                    const deck = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.025, 12), hull);
                    deck.position.y = 0.1;
                    add(deck);
                    const dish = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.55), accent);
                    dish.position.set(0.1, 0.12, 0);
                    dish.rotation.z = -0.4;
                    add(dish);
                    const dock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 0.14), hull);
                    dock.position.set(-0.09, -0.02, 0);
                    add(dock);
                    break;
                }
                case 'array': {
                    const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2, 6), hull);
                    mast.position.y = 0.05;
                    add(mast);
                    for (let i = 0; i < 2; i++) {
                        const panel = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.012, 0.14), hull);
                        panel.position.set(0, 0.02 + i * 0.1, 0);
                        panel.rotation.y = i * 0.25;
                        add(panel);
                        const gl = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.006, 0.12), accent);
                        gl.position.copy(panel.position);
                        gl.position.y += 0.008;
                        gl.rotation.copy(panel.rotation);
                        add(gl);
                    }
                    break;
                }
                case 'lab': {
                    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.06, 10), hull);
                    add(base);
                    const dome = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 10, 0, Math.PI * 2, 0, Math.PI * 0.5), accent);
                    dome.position.y = 0.05;
                    add(dome);
                    const spire = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.08, 6), warm);
                    spire.position.y = 0.16;
                    add(spire);
                    break;
                }
                case 'habitat': {
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.11, 0.018, 8, 20), hull);
                    ring.rotation.x = Math.PI / 2;
                    add(ring);
                    const hub = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 10), accent);
                    add(hub);
                    const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.04, 8), hull);
                    cap.position.y = 0.08;
                    add(cap);
                    break;
                }
                case 'factory': {
                    const base = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.08, 0.16), hull);
                    add(base);
                    const stack = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.12, 8), hull);
                    stack.position.set(0.06, 0.08, 0.04);
                    add(stack);
                    const win = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.04, 0.02), accent);
                    win.position.set(-0.07, 0.02, 0.09);
                    add(win);
                    break;
                }
                case 'shield': {
                    const bubble = new THREE.Mesh(new THREE.IcosahedronGeometry(0.11, 1), new THREE.MeshStandardMaterial({
                        color: 0xa5f3fc,
                        emissive: 0x22d3ee,
                        emissiveIntensity: 0.35,
                        metalness: 0.2,
                        roughness: 0.15,
                        transparent: true,
                        opacity: 0.35
                    }));
                    add(bubble);
                    const tor = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.012, 6, 24), accent);
                    tor.rotation.x = Math.PI / 2;
                    tor.position.y = -0.02;
                    add(tor);
                    break;
                }
                case 'warpGate': {
                    const r1 = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.014, 8, 28), hull);
                    const r2 = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.01, 6, 22), accent);
                    r2.rotation.x = Math.PI / 3;
                    r2.rotation.y = Math.PI / 5;
                    add(r1);
                    add(r2);
                    const core = new THREE.Mesh(new THREE.OctahedronGeometry(0.04, 0), warm);
                    add(core);

        function syncMainOrbitMarkers() {
            if (!scene || !earth || !orbitMarkersGroup) return;
            if (mainHoveredRoot) {
                mainHoveredRoot.scale.setScalar(1);
                mainHoveredRoot = null;
            }
            mainHoveredMarker = null;
            while (orbitMarkersGroup.children.length) {
                const ch = orbitMarkersGroup.children[0];
                orbitMarkersGroup.remove(ch);
                disposeOrbitMarkerRoot(ch);
            }
            const buildOrder = ['station', 'array', 'lab', 'habitat', 'factory', 'shield', 'warpGate'];
            let slot = 0;
            buildOrder.forEach((type, ti) => {
                const count = GameState.buildings[type] || 0;
                if (count < 1 || !buildingData[type]) return;
                const n = Math.min(count, 4);
                const baseR = 2.05 + ti * 0.22;
                for (let j = 0; j < n; j++) {
                    const ang = slot * 0.75 + ti * 0.4 + j * 0.55;
                    const y = (ti % 2 === 0 ? 1 : -1) * (0.12 + j * 0.08);
                    const grp = createMainOrbitBuildingMarker(type);
                    grp.position.set(Math.cos(ang) * baseR, y, Math.sin(ang) * baseR);
                    grp.lookAt(new THREE.Vector3(0, 0, 0));
                    orbitMarkersGroup.add(grp);
                    slot++;
                }
            });
            const shipOrder = ['scout', 'fighter', 'cruiser', 'carrier'];
            shipOrder.forEach((type, si) => {
                const count = GameState.ships[type] || 0;
                if (count < 1 || !shipData[type]) return;
                const n = Math.min(count, 3);
                const baseR = 2.65 + si * 0.28;
                for (let j = 0; j < n; j++) {
                    const ang = -slot * 0.62 + si * 1.1 + j * 0.5;
                    const y = 0.2 + si * 0.12;
                    const grp = createMainOrbitShipMarker(type);
                    grp.position.set(Math.cos(ang) * baseR, y, Math.sin(ang) * baseR);
                    grp.lookAt(new THREE.Vector3(0, 0, 0));
                    orbitMarkersGroup.add(grp);
                    slot++;
                }
            });
            if (mainSelectionRing) {
                mainSelectionRing.visible = false;
            }
        }

        function getMainPickMeshes() {
            const list = [];
            if (orbitMarkersGroup) {
                orbitMarkersGroup.traverse(c => {
                    if (c.isMesh && c.userData.markerPick) list.push(c);
                });
            }
            if (earth && earth.userData && earth.userData.planetSurface) {
                list.push(earth);
            }
            return list;
        }

        function ndcFromEvent(event, domElement) {
            const rect = domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            return new THREE.Vector2(x, y);
        }

        function screenFromWorld3(v) {
            const vec = v.clone().project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            const x = (vec.x * 0.5 + 0.5) * rect.width + rect.left;
            const y = (-vec.y * 0.5 + 0.5) * rect.height + rect.top;
            return { clientX: x, clientY: y };
        }

        function pickMainScene(ndc) {
            if (!mainRaycaster || !camera) return [];
            mainRaycaster.setFromCamera(ndc, camera);
            return mainRaycaster.intersectObjects(getMainPickMeshes(), true);
        }

        function onMainPointerMove(event) {
            if (!renderer || mainSceneSuspended || document.getElementById('cmd-overlay')?.style.display === 'block') return;
            if (mainInteractMode === 'place') {
                renderer.domElement.style.cursor = 'crosshair';
                const ndc = ndcFromEvent(event, renderer.domElement);
                const hits = pickMainScene(ndc);
                let surf = null;
                for (let i = 0; i < hits.length; i++) {
                    const o = hits[i].object;
                    if (o.userData && o.userData.planetSurface) {
                        surf = hits[i];
                        break;
                    }
                }
                if (surf && mainPlacePreview && earth) {
                    mainPlacePreview.visible = true;
                    const local = surf.point.clone();
                    earth.worldToLocal(local);
                    mainPlacePreview.position.copy(local);
                    const n = local.clone().normalize();
                    mainPlacePreview.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), n);
                } else if (mainPlacePreview) {
                    mainPlacePreview.visible = false;
                }
                return;
            }
            const ndc = ndcFromEvent(event, renderer.domElement);
            const hits = pickMainScene(ndc);
            let marker = null;
            for (let i = 0; i < hits.length; i++) {
                const o = hits[i].object;
                if (o.userData && o.userData.markerPick) {
                    marker = o;
                    break;
                }
            }
            if (marker !== mainHoveredMarker) {
                if (mainHoveredRoot) {
                    mainHoveredRoot.scale.setScalar(1);
                    mainHoveredRoot = null;
                }
                mainHoveredMarker = marker;
                if (marker && marker.userData.markerHoverRoot) {
                    mainHoveredRoot = marker.userData.markerHoverRoot;
                    mainHoveredRoot.scale.setScalar(mainInteractMode === 'command' ? 1.14 : 1.06);
                }
            }
            const onMarker = mainInteractMode === 'command' && marker;
            renderer.domElement.style.cursor = onMarker ? 'pointer' : 'grab';
        }

        function onMainPointerDown(event) {
            if (event.button !== 0 || !renderer) return;
            mainPointerDown = { x: event.clientX, y: event.clientY, t: performance.now() };
        }

        function onMainPointerUp(event) {
            if (event.button !== 0 || !renderer || mainSceneSuspended) return;
            if (document.getElementById('cmd-overlay')?.style.display === 'block' || document.getElementById('personal-overlay')?.style.display === 'block') return;
            if (!mainPointerDown) return;
            const dx = event.clientX - mainPointerDown.x;
            const dy = event.clientY - mainPointerDown.y;
            mainPointerDown = null;
            if (Math.hypot(dx, dy) > MAIN_PICK_DRAG_PX) return;

            const ndc = ndcFromEvent(event, renderer.domElement);
            const hits = pickMainScene(ndc);

            if (mainInteractMode === 'place' && placePendingType) {
                let surfHit = null;
                for (let i = 0; i < hits.length; i++) {
                    if (hits[i].object.userData && hits[i].object.userData.planetSurface) {
                        surfHit = hits[i];
                        break;
                    }
                }
                if (!surfHit) {
                    notify('请点击星球表面完成部署', 'warning');
                    return;
                }
                const fakeEv = screenFromWorld3(surfHit.point);
                constructBuilding(placePendingType, fakeEv);
                exitPlaceMode();
                syncMainOrbitMarkers();
                return;
            }

            for (let i = 0; i < hits.length; i++) {
                const obj = hits[i].object;
                if (obj.userData && obj.userData.markerPick) {
                    if (mainInteractMode !== 'command') {
                        notify('按 G 进入指挥模式以检视轨道设施', 'info');
                        return;
                    }
                    if (obj.userData.markerKind === 'building' && obj.userData.buildingType) {
                        openBuildingDetail(obj.userData.buildingType, event);
                    } else if (obj.userData.markerKind === 'ship' && obj.userData.shipType) {
                        openShipDetail(obj.userData.shipType, event);
                    }
                    if (mainSelectionRing && earth) {
                        mainSelectionRing.visible = true;
                        const wp = new THREE.Vector3();
                        obj.getWorldPosition(wp);
                        earth.worldToLocal(wp);
                        mainSelectionRing.position.copy(wp);
                        mainSelectionRing.scale.setScalar(1);
                    }
                    return;
                }
            }

            if (hits.length && hits[0].object.userData && hits[0].object.userData.planetSurface) {
                notify('提示：按 G 切换指挥模式检视轨道站；建筑卡右上角 🎯 进入星球部署', 'info');
            }
        }

        function initMainSpatialInteraction() {
            if (!renderer || !scene || !earth) return;
            mainRaycaster = new THREE.Raycaster();
            orbitMarkersGroup = new THREE.Group();
            earth.add(orbitMarkersGroup);
            syncMainOrbitMarkers();

            const ringGeo = new THREE.TorusGeometry(0.14, 0.018, 12, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x7af0d4, transparent: true, opacity: 0.85 });
            mainSelectionRing = new THREE.Mesh(ringGeo, ringMat);
            mainSelectionRing.rotation.x = Math.PI / 2;
            mainSelectionRing.visible = false;
            earth.add(mainSelectionRing);

            const prevGeo = new THREE.TorusGeometry(0.09, 0.012, 10, 28);
            const prevMat = new THREE.MeshBasicMaterial({ color: 0x67e8f9, transparent: true, opacity: 0.75 });
            mainPlacePreview = new THREE.Mesh(prevGeo, prevMat);
            mainPlacePreview.rotation.x = Math.PI / 2;
            mainPlacePreview.visible = false;
            earth.add(mainPlacePreview);

            const dom = renderer.domElement;
            dom.addEventListener('pointerdown', onMainPointerDown);
            dom.addEventListener('pointerup', onMainPointerUp);
            dom.addEventListener('pointermove', onMainPointerMove);

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') exitPlaceMode();
                if (e.key === 'g' || e.key === 'G') {
                    if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
                    cycleMainInteractMode();
                }
            });
        }

        function stepGameLoop() {
            const now = performance.now();
            if (!lastGameClockMs) lastGameClockMs = now;
            let dt = (now - lastGameClockMs) / 1000;
            lastGameClockMs = now;
            if (dt > 0.5) dt = 0.5;
            gameSimAccum += dt;
            while (gameSimAccum >= GAME_TICK_SEC) {
                gameSimAccum -= GAME_TICK_SEC;
                runGameTickOnce();
            }
        }

        function runGameTickOnce() {
            if (GameState.paused) return;
            if (!Number.isFinite(GameState.timeSpeed)) {
                GameState.timeSpeed = 1;
                document.querySelectorAll('.time-controls .time-btn[data-speed]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.speed === '1');
                });
            }
            if (!GameState.infiniteResources) {
                GameState.energy += GameState.energyRate / 10 * GameState.timeSpeed;
                GameState.minerals += GameState.mineralRate / 10 * GameState.timeSpeed;
                GameState.science += GameState.scienceRate / 10 * GameState.timeSpeed;
            }
            if (GameState.autoRefill) {
                GameState.energy = Math.max(GameState.energy, 100);
                GameState.minerals = Math.max(GameState.minerals, 50);
            }
            if (GameState.currentResearch) {
                const tech = techTreeData.find(t => t.id === GameState.currentResearch);
                if (tech) {
                    GameState.researchProgress += 10 * GameState.timeSpeed;
                    if (GameState.researchProgress >= tech.cost) {
                        GameState.technologies[tech.id] = true;
                        tech.effect();
                        notify(`${tech.name} 研究完成！`, 'success');
                        flashScreen();
                        GameState.currentResearch = null;
                        GameState.researchProgress = 0;
                        recalcRates();
                        renderTechTree();
                    } else {
                        const techNode = document.querySelector('.tech-node.researching');
                        if (techNode) {
                            const costEl = techNode.querySelector('.tech-cost');
                            if (costEl) costEl.textContent = `研究中... ${Math.floor(GameState.researchProgress * 100 / tech.cost)}%`;
                        }
                    }
                }
            }
            GameState.day += 0.01 * GameState.timeSpeed;
            updateResourceDisplay();
        }
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('earth-container').appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 12;
            controls.enablePan = false;
            
            const geometry = new THREE.SphereGeometry(1.8, 64, 64);
            const textureLoader = new THREE.TextureLoader();
            const material = new THREE.MeshPhongMaterial({
                map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05,
                shininess: 5
            });
            earth = new THREE.Mesh(geometry, material);
            earth.userData.planetSurface = true;
            earth.userData.isHomeworldCore = true;
            earth.userData.isEarthObj = true;
            scene.add(earth);

            colonyEarthSystem = new THREE.Group();
            colonyEarthSystem.userData.isColonyWorld = true;
            colonyEarthSystem.position.set(5.4, 0.85, -3.8);
            const cRad = 0.52;
            const cBody = new THREE.Mesh(
                new THREE.SphereGeometry(cRad, 48, 48),
                new THREE.MeshPhongMaterial({
                    map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg'),
                    bumpMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_normal_2048.jpg'),
                    bumpScale: 0.05,
                    shininess: 5
                })
            );
            cBody.userData.colonyVisualOnly = true;
            colonyEarthBody = cBody;
            colonyEarthSystem.add(cBody);
            const cCloud = new THREE.Mesh(
                new THREE.SphereGeometry(cRad * 1.04, 40, 40),
                new THREE.MeshPhongMaterial({
                    map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_clouds_1024.png'),
                    transparent: true,
                    opacity: 0.78,
                    depthWrite: false
                })
            );
            cCloud.userData.colonyVisualOnly = true;
            colonyEarthSystem.add(cCloud);
            scene.add(colonyEarthSystem);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(6, 4, 6);
            scene.add(directionalLight);
            
            const rimLight = new THREE.DirectionalLight(0x4488ff, 0.3);
            rimLight.position.set(-4, 2, -3);
            scene.add(rimLight);
            
            // Stars
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.02,
                transparent: true,
                opacity: 0.9
            });
            
            const starsVertices = [];
            for (let i = 0; i < 8000; i++) {
                const x = (Math.random() - 0.5) * 80;
                const y = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                starsVertices.push(x, y, z);
            }
            
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
            
            // 1. Black Hole
            const bhGeo = new THREE.TorusGeometry(0.8, 0.1, 32, 100);
            const bhMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform float time;
                    void main() {
                        float a = atan(vUv.y - 0.5, vUv.x - 0.5);
                        float r = distance(vUv, vec2(0.5));
                        float pulse = sin(a * 10.0 + time * 2.0) * 0.1;
                        gl_FragColor = vec4(1.0, 0.2, 0.0, 0.6 + pulse);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                uniforms: { time: { value: 0 } }
            });
            blackhole = new THREE.Mesh(bhGeo, bhMat);
            blackhole.position.set(5, 3, 0);
            blackhole.visible = false;
            scene.add(blackhole);
            
            // 2. Wormhole
            const whGeo = new THREE.TorusKnotGeometry(0.5, 0.15, 64, 8);
            const whMat = new THREE.MeshBasicMaterial({ color: 0x8844ff, transparent: true, opacity: 0.7 });
            wormhole = new THREE.Mesh(whGeo, whMat);
            wormhole.position.set(-5, -2, 1);
            wormhole.visible = false;
            scene.add(wormhole);
            
            // 3. Shield
            const shieldGeo = new THREE.SphereGeometry(2.5, 32, 32);
            const shieldMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    uniform float time;
                    void main() {
                        float fr = pow(1.0 - abs(dot(vNormal, vec3(0,0,1))), 1.5);
                        float pulse = sin(time * 3.0) * 0.1 + 0.5;
                        gl_FragColor = vec4(0.0, 0.8, 1.0, fr * pulse);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                uniforms: { time: { value: 0 } }
            });
            shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.visible = false;
            scene.add(shieldMesh);
            
            // 4. Asteroid Belt
            const asteroidGroup = new THREE.Group();
            for (let i = 0; i < 30; i++) {
                const astGeo = new THREE.DodecahedronGeometry(0.1 + Math.random() * 0.15);
                const astMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 1 });
                const asteroid = new THREE.Mesh(astGeo, astMat);
                const angle = (i / 30) * Math.PI * 2;
                const radius = 4 + Math.random() * 1.5;
                asteroid.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 1.5, Math.sin(angle) * radius);
                asteroid.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                asteroidGroup.add(asteroid);
            }
            asteroids = asteroidGroup;
            asteroids.visible = false;
            scene.add(asteroids);
            
            // 5. Alien Ship
            const shipGeo = new THREE.ConeGeometry(0.15, 0.5, 8);
            const shipMat = new THREE.MeshBasicMaterial({ color: 0x44ff88, transparent: true, opacity: 0.8 });
            alienShip = new THREE.Mesh(shipGeo, shipMat);
            alienShip.rotation.x = Math.PI;
            alienShip.position.set(3, 2, 3);
            alienShip.visible = false;
            scene.add(alienShip);
            
            // 6. Time Rift
            const riftGeo = new THREE.RingGeometry(0.4, 0.6, 32);
            const riftMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
            timeRift = new THREE.Mesh(riftGeo, riftMat);
            timeRift.position.set(-4, 3, -2);
            timeRift.visible = false;
            scene.add(timeRift);
            
            // 7. Extra Particles
            const pGeo = new THREE.BufferGeometry();
            const pCount = 500;
            const pPos = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i += 3) {
                pPos[i] = (Math.random() - 0.5) * 15;
                pPos[i + 1] = (Math.random() - 0.5) * 15;
                pPos[i + 2] = (Math.random() - 0.5) * 15;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.03, transparent: true, opacity: 0.7 });
            particles = new THREE.Points(pGeo, pMat);
            particles.visible = false;
            scene.add(particles);
            
            initMainSpatialInteraction();
            animate();
        }
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            stepGameLoop();
            if (mainSceneSuspended) return;
            if (!earth) return;
            if (!Number.isFinite(GameState.timeSpeed)) GameState.timeSpeed = 1;
            if (earth && (!Number.isFinite(earth.rotation.x) || !Number.isFinite(earth.rotation.y))) {
                earth.rotation.set(0, 0, 0);
            }
            time += 0.01;
            
            if (controls) controls.update();
            
            earth.rotation.y += 0.0015 * GameState.timeSpeed;
            earth.rotation.x = Math.sin(time * 0.2) * 0.05;

            if (colonyEarthSystem) {
                colonyEarthSystem.rotation.y += 0.00035 * GameState.timeSpeed;
            }
            if (colonyEarthBody) {
                colonyEarthBody.rotation.y += 0.0011 * GameState.timeSpeed;
            }

            if (orbitMarkersGroup) {
                orbitMarkersGroup.children.forEach((markerRoot) => {
                    const spin = markerRoot.userData.spinGroup;
                    if (spin) spin.rotation.y += 0.012 * GameState.timeSpeed;
                });
            }
            if (mainPlacePreview && mainPlacePreview.visible) {
                const ps = 0.94 + Math.sin(time * 3.6) * 0.1;
                mainPlacePreview.scale.setScalar(ps);
            }
            
            // 更新可见性
            blackhole.visible = activeFeatures.blackhole;
            wormhole.visible = activeFeatures.wormhole;
            shieldMesh.visible = activeFeatures.shield;
            asteroids.visible = activeFeatures.mining;
            alienShip.visible = activeFeatures.alienResearch;
            timeRift.visible = activeFeatures.timeRift;
            particles.visible = activeFeatures.quantum;
            
            // 高级动画
            if (blackhole.visible) {
                blackhole.rotation.z += 0.02;
                blackhole.scale.setScalar(1 + Math.sin(time * 3) * 0.1);
                if (blackhole.material.uniforms) blackhole.material.uniforms.time.value = time;
            }
            
            if (wormhole.visible) {
                wormhole.rotation.x += 0.01;
                wormhole.rotation.y += 0.015;
                wormhole.scale.setScalar(1 + Math.sin(time * 4) * 0.08);
            }
            
            if (shieldMesh.visible) {
                shieldMesh.rotation.y += 0.003;
                if (shieldMesh.material.uniforms) shieldMesh.material.uniforms.time.value = time;
            }
            
            if (asteroids.visible) {
                asteroids.rotation.y += 0.002;
                asteroids.children.forEach((a, i) => {
                    a.rotation.x += 0.01;
                    a.rotation.z += 0.008;
                });
            }
            
            if (alienShip.visible) {
                alienShip.position.x = 3 + Math.sin(time * 1.5) * 2;
                alienShip.position.y = 2 + Math.cos(time * 1.2) * 1.5;
                alienShip.position.z = 3 + Math.sin(time * 0.8) * 1.5;
            }
            
            if (timeRift.visible) {
                timeRift.rotation.z += 0.03;
                timeRift.scale.setScalar(1 + Math.sin(time * 5) * 0.2);
            }
            
            if (particles.visible) {
                particles.rotation.y += 0.002;
                particles.rotation.x += 0.001;
            }
            
            const bgStars = scene.children.find(c => c.isPoints && c.geometry.attributes.position.array.length === 24000);
            if (bgStars) {
                bgStars.rotation.y += 0.0002;
            }
            
            renderer.render(scene, camera);
        }

        function setMainSceneVisibility(visible) {
            mainSceneSuspended = !visible;
            const earthContainer = document.getElementById('earth-container');
            if (earthContainer) {
                earthContainer.style.opacity = visible ? '1' : '0';
                earthContainer.style.visibility = visible ? 'visible' : 'hidden';
                earthContainer.style.transition = 'opacity 0.45s cubic-bezier(0.16, 1, 0.3, 1)';
            }
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Save main scene camera state before personal page opens
        const savedCameraState = { position: { x: 0, y: 0, z: 5 }, target: { x: 0, y: 0, z: 0 } };
        window.__saveMainSceneState = () => {
            savedCameraState.position.x = camera.position.x;
            savedCameraState.position.y = camera.position.y;
            savedCameraState.position.z = camera.position.z;
            if (controls) {
                savedCameraState.target.x = controls.target.x;
                savedCameraState.target.y = controls.target.y;
                savedCameraState.target.z = controls.target.z;
            }
        };
        window.__restoreMainScene = () => {
            camera.position.set(savedCameraState.position.x, savedCameraState.position.y, savedCameraState.position.z);
            if (controls) {
                controls.target.set(savedCameraState.target.x, savedCameraState.target.y, savedCameraState.target.z);
                controls.update();
            }
        };

        function initTabs() {
            document.querySelectorAll('.panel-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const tabName = tab.dataset.tab;
                    document.getElementById('build-content').style.display = tabName === 'build' ? 'block' : 'none';
                    document.getElementById('fleet-content').style.display = tabName === 'fleet' ? 'block' : 'none';
                    document.getElementById('missions-content').style.display = tabName === 'missions' ? 'block' : 'none';
                    document.getElementById('tech-content').style.display = tabName === 'tech' ? 'block' : 'none';
                    document.getElementById('market-content').style.display = tabName === 'market' ? 'block' : 'none';
                    if (tabName === 'build') renderBuildings();
                    if (tabName === 'fleet') renderShips();
                    if (tabName === 'missions') renderMissions();
                    if (tabName === 'tech') renderTechTree();
                    if (tabName === 'market') renderMarket();
                });
            });
        }

        function initTimeControls() {
            document.querySelectorAll('.time-controls .time-btn[data-speed]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.time-controls .time-btn[data-speed]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const speed = parseInt(btn.dataset.speed);
                    if (Number.isNaN(speed)) return;
                    if (speed === 0) {
                        GameState.paused = true;
                        GameState.timeSpeed = 0;
                    } else {
                        GameState.paused = false;
                        GameState.timeSpeed = speed;
                    }
                });
            });
        }

        function initEventSystem() {
            setInterval(() => {
                if (GameState.paused || Math.random() > 0.15) return;
                if (document.getElementById('event-popup').classList.contains('active')) return;
                showEvent();
            }, 30000);
        }

        document.body.appendChild(personalOverlay);

        document.body.appendChild(cmdOverlay);

        document.getElementById('personal-page-btn').addEventListener('click', () => {

                setMainSceneVisibility(false);

        document.getElementById('cmd-center-btn').addEventListener('click', () => {
            const ov = document.getElementById('cmd-overlay');
