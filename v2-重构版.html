        function rebuildEarthPlanet() {
            if (!scene || !renderer) return;
            const toRemove = [];
            scene.traverse(c => { if (c.userData && c.userData.isHomeworldCore) toRemove.push(c); });
            toRemove.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (obj.material.map) obj.material.map.dispose();
                    obj.material.dispose();
                }
            });

            const texLoader = new THREE.TextureLoader();
            const earthMat = new THREE.MeshPhongMaterial({
                map: texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05,
                shininess: 5
            });
            const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(1.8, 128, 128), earthMat);
            earthMesh.castShadow = true;
            earthMesh.userData.isEarthObj = true;
            earthMesh.userData.isHomeworldCore = true;
            earthMesh.userData.planetSurface = true;
            scene.add(earthMesh);
            earth = earthMesh;

            if (orbitMarkersGroup && orbitMarkersGroup.parent && orbitMarkersGroup.parent !== earth) {
                orbitMarkersGroup.parent.remove(orbitMarkersGroup);
            }
            if (mainSelectionRing && mainSelectionRing.parent && mainSelectionRing.parent !== earth) {
                mainSelectionRing.parent.remove(mainSelectionRing);
            }
            if (mainPlacePreview && mainPlacePreview.parent && mainPlacePreview.parent !== earth) {
                mainPlacePreview.parent.remove(mainPlacePreview);
            }
            if (orbitMarkersGroup) earth.add(orbitMarkersGroup);
            if (mainSelectionRing) earth.add(mainSelectionRing);
            if (mainPlacePreview) earth.add(mainPlacePreview);
            syncMainOrbitMarkers();
        }

                cmdState.canvas.removeEventListener('click', cmdState.mapClickHandler);

            if (cmdState.canvas && cmdState.mapMoveHandler) {

            }
            cmdState.animId = null;
            cmdState.resizeHandler = null;
            cmdState.canvas = null;
            cmdState.ctx = null;
            cmdState.mapHitTargets = [];
            cmdState.mapHoverIdx = -1;

        function bindCmdActionButtons(root) {
            if (!root) return;
            root.querySelectorAll('[data-cmd-action]').forEach(button => {
                button.addEventListener('click', event => {
                    event.stopPropagation();
                    runCmdAction(button.dataset.cmdAction, button.dataset.cmdId, event);
                });
            });
        }

        function runCmdAction(action, id, event) {
            if (action === 'build-building') {
                constructBuilding(id, event);
            } else if (action === 'build-ship') {
                buildShip(id, event);
            } else if (action === 'deploy-ship') {
                deployShip(id);
                updateResourceDisplay();
            } else if (action === 'research-tech') {
                const tech = techTreeData.find(entry => entry.id === id);
                if (tech) {
                    startResearch(tech);
                }
            }
        }

        function startCmdTacticalMap(snapshot) {
            const canvas = document.getElementById('cmd-map-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            cmdState.canvas = canvas;
            cmdState.ctx = ctx;

            if (cmdState.canvas && cmdState.mapClickHandler) {
                cmdState.canvas.removeEventListener('click', cmdState.mapClickHandler);
                cmdState.mapClickHandler = null;
            }
            if (cmdState.canvas && cmdState.mapMoveHandler) {
                cmdState.canvas.removeEventListener('mousemove', cmdState.mapMoveHandler);
                cmdState.mapMoveHandler = null;
            }

            const resize = () => {
                const rect = canvas.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            };

            resize();
            if (cmdState.resizeHandler) window.removeEventListener('resize', cmdState.resizeHandler);
            cmdState.resizeHandler = resize;
            window.addEventListener('resize', resize);
            if (cmdState.animId) cancelAnimationFrame(cmdState.animId);

            let tick = 0;

            cmdState.mapClickHandler = (ev) => {
                const rect = canvas.getBoundingClientRect();
                const mx = ev.clientX - rect.left;
                const my = ev.clientY - rect.top;
                for (let i = cmdState.mapHitTargets.length - 1; i >= 0; i--) {
                    const t = cmdState.mapHitTargets[i];
                    if (Math.hypot(mx - t.x, my - t.y) <= t.r) {
                        cmdState.selected = { kind: t.kind, id: t.id };
                        renderCmdInspector(getEmpireSnapshot());
                        return;
                    }
                }
            };
            cmdState.mapMoveHandler = (ev) => {
                const rect = canvas.getBoundingClientRect();
                const mx = ev.clientX - rect.left;
                const my = ev.clientY - rect.top;
                let hit = false;
                for (let i = 0; i < cmdState.mapHitTargets.length; i++) {
                    const t = cmdState.mapHitTargets[i];
                    if (Math.hypot(mx - t.x, my - t.y) <= t.r) {
                        hit = true;
                        break;
                    }
                }
                canvas.style.cursor = hit ? 'pointer' : 'default';
            };
            canvas.addEventListener('click', cmdState.mapClickHandler);
            canvas.addEventListener('mousemove', cmdState.mapMoveHandler);

            const animate = () => {
                tick += 0.012;
                const live = getEmpireSnapshot();
                const buildingNodes = live.buildingStates.filter(item => item.count > 0);
                const shipNodes = live.shipStates.filter(item => item.count > 0);
                const w = canvas.clientWidth;
                const h = canvas.clientHeight;
                ctx.clearRect(0, 0, w, h);

                const cx = w * 0.5;
                const cy = h * 0.53;
                const planetR = Math.min(w, h) * 0.16;

                const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, planetR * 3.2);
                bgGrad.addColorStop(0, 'rgba(48,110,255,0.18)');
                bgGrad.addColorStop(1, 'rgba(4,10,20,0)');
                ctx.fillStyle = bgGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, planetR * 3.2, 0, Math.PI * 2);
                ctx.fill();

                for (let i = 0; i < 5; i++) {
                    const radius = planetR * (1.55 + i * 0.38);
                    ctx.strokeStyle = `rgba(124,184,255,${0.06 + i * 0.015})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, radius, radius * (0.34 + i * 0.03), 0.24, 0, Math.PI * 2);
                    ctx.stroke();
                }

                const planetGrad = ctx.createRadialGradient(cx - planetR * 0.25, cy - planetR * 0.35, planetR * 0.18, cx, cy, planetR);
                planetGrad.addColorStop(0, 'rgba(155,208,255,0.95)');
                planetGrad.addColorStop(0.35, 'rgba(70,136,255,0.92)');
                planetGrad.addColorStop(1, 'rgba(12,28,62,0.98)');
                ctx.fillStyle = planetGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, planetR, 0, Math.PI * 2);
                ctx.fill();

                cmdState.mapHitTargets = [];

                buildingNodes.forEach((node, idx) => {
                    const angle = tick * (0.5 + idx * 0.04) + idx * 0.9;
                    const radius = planetR * (1.65 + idx * 0.33);
                    const x = cx + Math.cos(angle) * radius;
                    const y = cy + Math.sin(angle) * radius * 0.42;
                    ctx.strokeStyle = 'rgba(92,169,255,0.18)';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    const sel = cmdState.selected && cmdState.selected.kind === 'building' && cmdState.selected.id === node.id;
                    if (sel) {
                        ctx.strokeStyle = 'rgba(122,240,214,0.85)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x - 8, y - 8, 16, 16);
                        ctx.lineWidth = 1;
                    }
                    ctx.fillStyle = 'rgba(237,243,255,0.95)';
                    ctx.fillRect(x - 5, y - 5, 10, 10);
                    cmdState.mapHitTargets.push({ kind: 'building', id: node.id, x, y, r: 14 });
                });

                shipNodes.forEach((node, idx) => {
                    const angle = -tick * (0.7 + idx * 0.06) + idx * 1.2;
                    const radius = planetR * (2.2 + idx * 0.42);
                    const x = cx + Math.cos(angle) * radius;
                    const y = cy + Math.sin(angle) * radius * 0.48;
                    const sel = cmdState.selected && cmdState.selected.kind === 'ship' && cmdState.selected.id === node.id;
                    if (sel) {
                        ctx.strokeStyle = 'rgba(122,240,214,0.9)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(x, y + 2, 12, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.lineWidth = 1;
                    }
                    ctx.fillStyle = 'rgba(104,234,214,0.92)';
                    ctx.beginPath();
                    ctx.moveTo(x, y - 7);
                    ctx.lineTo(x + 6, y + 6);
                    ctx.lineTo(x - 6, y + 6);
                    ctx.closePath();
                    ctx.fill();
                    cmdState.mapHitTargets.push({ kind: 'ship', id: node.id, x, y: y + 2, r: 14 });
                });

                ctx.fillStyle = 'rgba(220,232,255,0.8)';
                ctx.font = '11px Inter';
                ctx.fillText('Tactical Orbital Mesh · 点击节点联动检视', 18, 24);
                ctx.fillText(`Build Nodes ${buildingNodes.length}`, 18, 42);
                ctx.fillText(`Fleet Nodes ${shipNodes.length}`, 18, 60);

                cmdState.animId = requestAnimationFrame(animate);
            };

            animate();
        }

                        case 3:
                            sm = new THREE.Group();
                            const caBody = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.08,0.5), orbitMat); caBody.castShadow=true; sm.add(caBody);
                            const caTower = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.1,0.06), orbitMat); caTower.position.set(0,0.09,-0.1); caTower.castShadow=true; sm.add(caTower);
                            break;
                    }
                    if (sm) { sm.traverse(c => { if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}}); grp.add(sm); }
                    grp.position.set(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
                    grp.userData = { type: 'ship', data: ship || {name:type,count:0}, index: si, orbitRadius: radius, orbitAngle: angle, orbitSpeed: 0.12 + si * 0.03, orbitY: y };
                    pScene.add(grp);
                    pShips.push(grp);
                    pClickables.push(grp);
                }
            });

            // Orbit rings - subtle purple glow
            const or1 = new THREE.Mesh(new THREE.RingGeometry(5,5.02,64), new THREE.MeshBasicMaterial({color:0x7877c6,transparent:true,opacity:0.12,side:THREE.DoubleSide}));
            or1.rotation.x=Math.PI/2; or1.position.y=-1.5; pScene.add(or1);
            const or2 = new THREE.Mesh(new THREE.RingGeometry(8,8.03,64), new THREE.MeshBasicMaterial({color:0x7877c6,transparent:true,opacity:0.08,side:THREE.DoubleSide}));
            or2.rotation.x=Math.PI/2.5; or2.rotation.y=0.3; or2.position.y=-1; pScene.add(or2);

            // v2 Enhancement: Dynamic orbit paths with glow effects
            const orbitPaths = [];
            const buildTypeCounts = ['station','array','lab','habitat','factory','shield','warpGate'];
            buildTypeCounts.forEach((type, ti) => {
                const count = GameState.buildings[type] || 0;
                if (count > 0) {
                    const radius = 2.5 + ti * 0.6;
                    const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
                    const points = curve.getPoints(128);
                    const geo = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, 0, p.y)));
                    const mat = new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.12 + ti * 0.02 });
                    const line = new THREE.Line(geo, mat);
                    pScene.add(line);
                    orbitPaths.push(line);
                }
            });
            const shipTypesOrbit = ['scout','fighter','cruiser','carrier'];
            shipTypesOrbit.forEach((type, si) => {
                const count = GameState.ships[type] || 0;
                if (count > 0) {
                    const radius = 3.5 + si * 0.8;
                    const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
                    const points = curve.getPoints(128);
                    const geo = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, 0.5 + si * 0.4, p.y)));
                    const mat = new THREE.LineBasicMaterial({ color: 0xf0f0f5, transparent: true, opacity: 0.08 + si * 0.02 });
                    const line = new THREE.Line(geo, mat);
                    pScene.add(line);
                    orbitPaths.push(line);
                }
            });

            // v2 Enhancement: Connection beams from buildings to planet
            const connectionBeams = [];
            pBases.forEach((b, i) => {
                const d = b.userData;
                if (d && d.orbitRadius) {
                    const beamGeo = new THREE.CylinderGeometry(0.003, 0.003, d.orbitRadius, 4);
                    const beamMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.06 });
                    const beam = new THREE.Mesh(beamGeo, beamMat);
                    beam.rotation.z = Math.PI / 2;
                    beam.userData.parentBase = b;
                    pScene.add(beam);
                    connectionBeams.push(beam);
                }
            });

            // v2 Enhancement: Trail particles following each model
            const trailParticles = [];
            const trailGeo = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(2000 * 3);
            const trailOpacities = new Float32Array(2000);
            trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPositions, 3));
            trailGeo.setAttribute('opacity', new THREE.Float32BufferAttribute(trailOpacities, 1));
            const trailMat = new THREE.PointsMaterial({ color: 0x60a5fa, size: 0.015, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
            const trailPts = new THREE.Points(trailGeo, trailMat);
            pScene.add(trailPts);
            let trailIndex = 0;
            const trailCount = 2000;

            // v2 Enhancement: Model selection ring
            let selectionRing = null;

            // Stars - exact same as main scene
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(8000 * 3);
            for (let i = 0; i < 8000; i++) { starPos[i*3]=(Math.random()-0.5)*80; starPos[i*3+1]=(Math.random()-0.5)*80; starPos[i*3+2]=(Math.random()-0.5)*80; }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            pScene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.02,transparent:true,opacity:0.9})));

            // Particles
            const pCnt = 500; const pp = new Float32Array(pCnt*3);
            for(let i=0;i<pCnt;i++){pp[i*3]=(Math.random()-0.5)*15;pp[i*3+1]=(Math.random()-0.5)*15;pp[i*3+2]=(Math.random()-0.5)*15;}
            const pPGeo = new THREE.BufferGeometry();
            pPGeo.setAttribute('position', new THREE.Float32BufferAttribute(pp, 3));
            const pPts = new THREE.Points(pPGeo, new THREE.PointsMaterial({color:0x44aaff,size:0.03,transparent:true,opacity:0.7}));
            pScene.add(pPts);

            // Raycaster
            pRaycaster = new THREE.Raycaster();
            pMouse = new THREE.Vector2();

            // Events
            const tooltip = document.getElementById('p-tooltip');
            function onMM(e) {
                pMouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                pRaycaster.setFromCamera(pMouse, pCamera);
                const allM = [];
                pClickables.forEach(o => { if(o.isMesh) allM.push(o); o.traverse(c => { if(c.isMesh) allM.push(c); }); });
                const ints = pRaycaster.intersectObjects(allM, false);
                if (ints.length > 0) {
                    const h = ints[0].object;
                    const d = h.userData.data; const t = h.userData.type;
                    if (d && t) {
                        pRenderer.domElement.style.cursor = 'pointer';
                        pHovered = { data: d, type: t };
                        let nm = t==='planet'?d.name : t==='base'?d.name+(d.count?' ×'+d.count:'') : d.name+(d.count?' ×'+d.count:'');
                        tooltip.textContent = nm;
                        tooltip.style.left = e.clientX+16+'px';
                        tooltip.style.top = e.clientY-10+'px';
                        tooltip.classList.add('show');
                    }
                } else {
                    pRenderer.domElement.style.cursor = 'default';
                    pHovered = null;
                    tooltip.classList.remove('show');
                }
            }

            function getStatusClass(status) {
                const map = {'运行中':'running','建造中':'building','待命':'standby','巡逻中':'patrol','远征中':'expedition','未建造':'building','未解锁':'standby'};
                return map[status] || 'standby';
            }

            function onCL(e) {
                if (!pHovered) return;
                const { data: d, type: t } = pHovered;
                let html = '';
                if (t==='planet') {
                    html = `<div class="personal-detail-type">${d.type}</div><div class="personal-detail-name">${d.name}</div><div class="personal-detail-desc">${d.desc}</div><div class="personal-detail-stats"><div class="p-detail-stat"><div class="p-detail-stat-label">能源产出</div><div class="p-detail-stat-val">${d.energy}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">矿物产出</div><div class="p-detail-stat-val">${d.minerals}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">科研产出</div><div class="p-detail-stat-val">${d.science}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">半径</div><div class="p-detail-stat-val">${d.radius}</div></div></div><div class="p-detail-actions"><button type="button" class="p-detail-btn secondary" data-p-act="scan" data-p-kind="planet">扫描</button><button type="button" class="p-detail-btn primary" data-p-act="manage" data-p-kind="planet">管理</button></div>`;
                } else if (t==='base') {
                    const realCount = GameState.buildings[d.id] || 0;
                    html = `<div class="personal-detail-type">${d.type}</div><div class="personal-detail-name">${d.name}</div><div class="personal-detail-desc">${d.desc}</div><div class="personal-detail-stats"><div class="p-detail-stat"><div class="p-detail-stat-label">数量</div><div class="p-detail-stat-val">${realCount}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">功率</div><div class="p-detail-stat-val">${d.power||0}%</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">效率</div><div class="p-detail-stat-val">${d.efficiency||0}%</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">状态</div><div class="p-detail-stat-val"><span class="p-detail-status ${getStatusClass(d.status)}">${d.status}</span></div></div></div><div class="p-detail-actions"><button type="button" class="p-detail-btn secondary" data-p-act="upgrade" data-p-kind="base" data-p-id="${d.id}">升级</button><button type="button" class="p-detail-btn primary" data-p-act="control" data-p-kind="base" data-p-id="${d.id}">控制</button></div>`;
                } else if (t==='ship') {
                    const realCount = GameState.ships[d.id] || 0;
                    html = `<div class="personal-detail-type">${d.type}</div><div class="personal-detail-name">${d.name}</div><div class="personal-detail-desc">${d.desc}</div><div class="personal-detail-stats"><div class="p-detail-stat"><div class="p-detail-stat-label">数量</div><div class="p-detail-stat-val">×${realCount}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">速度</div><div class="p-detail-stat-val">${d.speed||0}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">攻击</div><div class="p-detail-stat-val">${d.attack||0}</div></div><div class="p-detail-stat"><div class="p-detail-stat-label">状态</div><div class="p-detail-stat-val"><span class="p-detail-status ${getStatusClass(d.status)}">${d.status}</span></div></div></div><div class="p-detail-actions"><button type="button" class="p-detail-btn secondary" data-p-act="deploy" data-p-kind="ship" data-p-id="${d.id}">部署</button><button type="button" class="p-detail-btn primary" data-p-act="squad" data-p-kind="ship" data-p-id="${d.id}">编队</button></div>`;
                }
                document.getElementById('p-detail-content').innerHTML = html;
                document.getElementById('p-detail').classList.add('active');
            }

            pRenderer.domElement.addEventListener('mousemove', onMM);
            pRenderer.domElement.addEventListener('click', onCL);

            document.getElementById('p-close-btn').addEventListener('click', closePersonalPage);
            document.getElementById('p-detail-close').addEventListener('click', () => { document.getElementById('p-detail').classList.remove('active'); });

            const pDetailRoot = document.getElementById('p-detail');
            if (pDetailRoot && !pDetailRoot.dataset.personalActBound) {
                pDetailRoot.dataset.personalActBound = '1';
                pDetailRoot.addEventListener('click', (ev) => {
                    const btn = ev.target.closest('.p-detail-btn[data-p-act]');
                    if (!btn) return;
                    ev.stopPropagation();
                    const act = btn.dataset.pAct;
                    const kind = btn.dataset.pKind;
                    const id = btn.dataset.pId;
                    if (act === 'scan' && kind === 'planet') {
                        GameState.science = safeNumber(GameState.science, 0) + 35;
                        notify('轨道扫描完成：获得科研数据 +35', 'success');
                        updateResourceDisplay();
                    } else if (act === 'manage' && kind === 'planet') {
                        document.getElementById('p-detail').classList.remove('active');
                        closePersonalPage();
                        setTimeout(() => {
                            const tab = document.querySelector('.panel-tab[data-tab="build"]');
                            if (tab) tab.click();
                        }, 400);
                    } else if (act === 'upgrade' && kind === 'base' && id) {
                        if (GameState.minerals >= 120) {
                            GameState.minerals -= 120;
                            notify(`设施 ${buildingData[id]?.name || id} 结构强化完成`, 'success');
                            updateResourceDisplay();
                        } else {
                            notify('矿物不足，无法升级', 'error');
                        }
                    } else if (act === 'control' && kind === 'base' && id) {
                        if (!buildingData[id]) return;
                        document.getElementById('p-detail').classList.remove('active');
                        closePersonalPage();
                        setTimeout(() => {
                            const tab = document.querySelector('.panel-tab[data-tab="build"]');
                            if (tab) tab.click();
                            openBuildingDetail(id, ev);
                        }, 400);
                    } else if (act === 'deploy' && kind === 'ship' && id) {
                        if ((GameState.ships[id] || 0) < 1) {
                            notify('无可用舰体', 'warning');
                            return;
                        }
                        deployShip(id);
                        updateResourceDisplay();
                    } else if (act === 'squad' && kind === 'ship' && id) {
                        calcFleetPower();
                        notify(`已更新 ${shipData[id]?.name || id} 编队协议`, 'info');
                    }
                });
            }

            // Nav buttons
            document.querySelectorAll('.personal-nav-btn[data-pview]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.personal-nav-btn[data-pview]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    pCurrentView = btn.dataset.pview;
                    animateCamera(pCurrentView);
                });
            });

            function animateCamera(view) {
                const targets = {
                    overview: { pos: {x:0,y:0,z:5}, lookAt: {x:0,y:0,z:0}, showBases: true, showShips: true },
                    bases: { pos: {x:0,y:0,z:4}, lookAt: {x:0,y:0,z:0}, showBases: true, showShips: false },
                    ships: { pos: {x:0,y:2,z:6}, lookAt: {x:0,y:0,z:0}, showBases: false, showShips: true },
                };
                const t = targets[view];
                if (!t) return;

                const startPos = { x: pCamera.position.x, y: pCamera.position.y, z: pCamera.position.z };
                const endPos = t.pos;
                const duration = 1200;
                const startTime = Date.now();

                function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

                function animCam() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = easeOutCubic(progress);

                    pCamera.position.x = startPos.x + (endPos.x - startPos.x) * eased;
                    pCamera.position.y = startPos.y + (endPos.y - startPos.y) * eased;
                    pCamera.position.z = startPos.z + (endPos.z - startPos.z) * eased;

                    if (pControls && pControls.target) {
                        pControls.target.x = t.lookAt.x;
                        pControls.target.y = t.lookAt.y;
                        pControls.target.z = t.lookAt.z;
                    }

                    if (progress < 1) requestAnimationFrame(animCam);
                    else if (pControls) pControls.autoRotate = true;
                }
                animCam();

                if (pControls) pControls.autoRotate = false;
                pBases.forEach(b => b.visible = t.showBases);
                pShips.forEach(s => s.visible = t.showShips);
                pPlanetGroup.visible = true;
            }

            // Resize
            function onRS() { pCamera.aspect=window.innerWidth/window.innerHeight; pCamera.updateProjectionMatrix(); pRenderer.setSize(window.innerWidth,window.innerHeight); }
            window.addEventListener('resize', onRS);

            // Animate
            function pAnimate() {
                pAnimId = requestAnimationFrame(pAnimate);
                pTime += 0.01;
                if (pControls) pControls.update();
                // Planet rotation matches main scene
                if (pPlanet) pPlanet.rotation.y += 0.0015;
                // Orbiting buildings
                pBases.forEach((b, i) => {
                    const d = b.userData;
                    if (d && d.orbitRadius) {
                        d.orbitAngle += d.orbitSpeed * 0.008;
                        b.position.x = Math.cos(d.orbitAngle) * d.orbitRadius;
                        b.position.z = Math.sin(d.orbitAngle) * d.orbitRadius;
                        b.position.y = d.orbitY + Math.sin(pTime * 2 + i * 1.5) * 0.05;
                    }
                    b.rotation.y += 0.002;
                });
                // Orbiting ships
                pShips.forEach((s, i) => {
                    const d = s.userData;
                    if (d && d.orbitRadius) {
                        d.orbitAngle += d.orbitSpeed * 0.008;
                        s.position.x = Math.cos(d.orbitAngle) * d.orbitRadius;
                        s.position.z = Math.sin(d.orbitAngle) * d.orbitRadius;
                        s.position.y = d.orbitY + Math.cos(pTime * 1.2 + i * 1.8) * 0.05;
                    }
                    s.rotation.y += 0.005;
                });
                pPts.rotation.y += 0.002;
                pPts.rotation.x += 0.001;
                pRenderer.render(pScene, pCamera);
            }
            pAnimate();

            window.__personalDispose = () => {
                clearInterval(pStatsInterval);
                window.removeEventListener('resize', onRS);
                pRenderer.domElement.removeEventListener('mousemove', onMM);
                pRenderer.domElement.removeEventListener('click', onCL);
                cancelAnimationFrame(pAnimId);
                pRenderer.dispose();
            };
        }

    </script>
</body>
</html>
